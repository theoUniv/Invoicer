services:
  db:
    image: mysql:8.0
    container_name: invoicer-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-invoicer_db}
      MYSQL_USER: ${MYSQL_USER:-invoicer_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-invoicer_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_scripts/Invoicer_CREATE_TABLE.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - invoicer-network

  minio:
    image: quay.io/minio/minio:latest
    container_name: invoicer-minio
    restart: always
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - invoicer-network

  seeder:
    build:
      context: .
      dockerfile: docker/Dockerfile.seeder
    container_name: invoicer-seeder
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER:-invoicer_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-invoicer_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-invoicer_db}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_healthy
    profiles:
      - seeder # Run only when explicitly requested: docker compose run seeder

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoicer-api
    restart: always
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3001
      - MYSQL_HOST=db
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - DATABASE_URL=mysql://${MYSQL_USER:-invoicer_user}:${MYSQL_PASSWORD:-invoicer_password}@db:3306/${MYSQL_DATABASE:-invoicer_db}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - AIRFLOW_API_URL=http://airflow-webserver:8080/api/v1
      - AIRFLOW_API_USER=${AIRFLOW_ADMIN_USER:-admin}
      - AIRFLOW_API_PASS=${AIRFLOW_ADMIN_PASSWORD:-admin}
    ports:
      - "3001:3001"
    depends_on:
      - db
      - minio
    networks:
      - invoicer-network

  postgres:
    image: postgres:13
    container_name: invoicer-airflow-db
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB:-airflow}
    networks:
      - invoicer-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: invoicer-airflow-webserver
    depends_on:
      postgres:
        condition: service_started
    environment:
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres/${AIRFLOW_DB:-airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=300
      - _AIRFLOW_WWW_USER_CREATE=True
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_ADMIN_USER:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
      - MYSQL_HOST=db
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_RAW_BUCKET=${MINIO_RAW_BUCKET:-raw}
      - MINIO_SILVER_BUCKET=${MINIO_SILVER_BUCKET:-silver}
      - MINIO_GOLD_BUCKET=${MINIO_GOLD_BUCKET:-gold}
      - MINIO_SECURE=False
    volumes:
      - ./airflow-dags:/opt/airflow/dags
      - ./backend:/opt/airflow/backend
      - ./config:/opt/airflow/config
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - invoicer-network
    restart: always

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: invoicer-airflow-scheduler
    depends_on:
      postgres:
        condition: service_started
    environment:
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres/${AIRFLOW_DB:-airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - MYSQL_HOST=db
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_RAW_BUCKET=${MINIO_RAW_BUCKET:-raw}
      - MINIO_SILVER_BUCKET=${MINIO_SILVER_BUCKET:-silver}
      - MINIO_GOLD_BUCKET=${MINIO_GOLD_BUCKET:-gold}
      - MINIO_SECURE=False
    volumes:
      - ./airflow-dags:/opt/airflow/dags
      - ./backend:/opt/airflow/backend
      - ./config:/opt/airflow/config
    command: scheduler
    networks:
      - invoicer-network
    restart: always

  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: invoicer-airflow-init
    depends_on:
      postgres:
        condition: service_started
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres/${AIRFLOW_DB:-airflow}
      - _AIRFLOW_DB_UPGRADE=True
      - _AIRFLOW_WWW_USER_CREATE=True
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_ADMIN_USER:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
    command: version
    networks:
      - invoicer-network
    profiles:
      - airflow-init

networks:
  invoicer-network:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
  postgres_data:
